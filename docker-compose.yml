services:
  redis:
    image: redis:7-alpine
    container_name: noaff-redis
    restart: unless-stopped

  noaff:
    build: .
    container_name: noaff-monitor
    restart: unless-stopped
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      APP_HOST: 0.0.0.0
      CHROMIUM_BINARY: /usr/bin/chromium
      LIMITER_STORAGE_URI: redis://redis:6379/0
    ports:
      - "${DOCKER_BIND_HOST:-0.0.0.0}:${PUBLIC_APP_PORT:-7777}:${APP_PORT:-7777}"
    volumes:
      - ./data:/app/data
    shm_size: "1gb"
